# v12: fix trainer bottleneck — root cause was 42k token sequences, not batch size
# - num_leads=4 (was 8) — cuts seq length from ~42k to ~20k (back to v4 regime)
# - context_max_seq_len=20000 — explicit seq len for summarization (infra doesn't set it)
# - checkpoint_interval=10 (was 5) — halves checkpoint write overhead
# - batch=64, oversampling=2.0, pure MRR reward

model = "PrimeIntellect/INTELLECT-3.1"
max_steps = 50
batch_size = 64
rollouts_per_example = 16
oversampling_factor = 2.0
max_async_level = 2
learning_rate = 5e-5
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 4, total_hours = 2, context_rewrite_threshold = 0.60, context_keep_recent = 10, context_max_seq_len = 20000 }

[eval]
interval = 10
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 4, total_hours = 2, context_rewrite_threshold = 0.60, context_keep_recent = 10, context_max_seq_len = 20000 }

# [val]
# interval = 10
# num_examples = 8
# rollouts_per_example = 1

[buffer]
online_difficulty_filtering = false
seed = 2026

[checkpoints]
interval = 10
keep_cloud = 3

