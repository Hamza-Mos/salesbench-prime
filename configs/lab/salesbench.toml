# v20: keep v19 system prompt (tool discipline), revert grace period
# v19 problem: grace period made ALL episodes 4000-9700 tokens → 40+ min/step
# Fix: revert to instant no_tools_called termination, keep improved system prompt.
# NOTE: eval section removed due to platform regression (eval.env parsed as dict)
# TODO: re-add [eval] when platform fixes the config validation bug

model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 100
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.0
max_async_level = 1
learning_rate = 3e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 0.8

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3-30b-salesbench-v20"
entity = "hamza-mos-university-of-waterloo"
