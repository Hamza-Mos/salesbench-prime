# v5: Prime team feedback — lower max_tokens, higher temp, more leads
# - max_tokens 49152→4096 (force concise completions, near-zero truncation)
# - temperature 0.7→1.0 (more exploration, standard for RL)
# - 4 leads/4h (fits in 4k budget with concise behavior)
# - lr=5e-5, batch=256, episode_completion=0.50 (kept from v4)

model = "PrimeIntellect/INTELLECT-3.1"
max_steps = 50
batch_size = 256
rollouts_per_example = 16
max_async_level = 2
learning_rate = 5e-5
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 4, total_hours = 4 }

[eval]
interval = 10
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 4, total_hours = 4 }

[val]
interval = 10
num_examples = 8
rollouts_per_example = 1

[buffer]
online_difficulty_filtering = false
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 3

