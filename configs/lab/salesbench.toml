# Hosted RL starter config for the new salesbench-prime-rl harness.
# Replace the env id with your pushed private/public environment id.

model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 300
batch_size = 256
rollouts_per_example = 8
env_file = ["secrets.env"]

[sampling]
max_tokens = 24576
temperature = 0.2

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 48, total_hours = 40 }

[eval]
interval = 25
num_examples = 64
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 48, total_hours = 40 }

[val]
interval = 10
num_examples = 64
rollouts_per_example = 1

[buffer]
online_difficulty_filtering = true
easy_threshold = 0.85
hard_threshold = 0.20
easy_fraction = 0.0
hard_fraction = 0.0
seed = 2026
