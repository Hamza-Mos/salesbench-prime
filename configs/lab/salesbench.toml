# v4: Restart from step 5 checkpoint — fix step 9 ModelError collapse
# - lr 1e-4→5e-5 (prevent weight updates from breaking JSON tool formatting)
# - batch 256→512 (stable gradients, Prime docs recommendation for agentic)
# - Warm-start from step 5 checkpoint (reward=0.6943, 0% errors)

model = "PrimeIntellect/INTELLECT-3.1"
max_steps = 50
batch_size = 512
rollouts_per_example = 16
max_async_level = 2
learning_rate = 5e-5
checkpoint_id = "echls0vjvnus3vpd3iutkyuk"
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 49152
temperature = 0.7

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 2 }

[eval]
interval = 10
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 2, total_hours = 2 }

[val]
interval = 10
num_examples = 8
rollouts_per_example = 1

[buffer]
online_difficulty_filtering = false
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 3

