# v41: try Qwen3.5-2B (skipped tier between 0.8B-collapsed and 4B-working).
# v39 (0.8B) collapsed at step 26; v40 (4B) showed reward 0.162 (11% of ceiling)
# at step 0 with 22% conv rate. 2B is the untested middle tier — 2.5× cheaper
# per token than 4B at $0.05/$0.15/$0.15 vs $0.10/$0.30/$0.30 per 1M.
# Strategy stays the same: cheapest base that holds the workflow without
# do-nothing collapse. If 2B step 0 shows >5% conv rate (vs 0.5% on 0.8B,
# 22% on 4B), it's a viable middle ground. If 2B collapses like 0.8B,
# fall back to 4B (proven working).
# v36 reward shape unchanged. Working buyer LLM confirmed 2026-05-09.
# CRITICAL post-launch check: metric_buyer_llm_call_count > 0 by step 0.

model = "Qwen/Qwen3.5-2B"
max_steps = 200
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3.5-2b-salesbench-v41"
entity = "hamza-mos-university-of-waterloo"
