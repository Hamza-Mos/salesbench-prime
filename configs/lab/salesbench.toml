# Fast proof-of-concept config: prove hill-climbing in <24h
# Fixed: max_tokens for full episodes, larger batch, no difficulty filtering

model = "PrimeIntellect/INTELLECT-3.1"
max_steps = 50
batch_size = 128
rollouts_per_example = 8
max_async_level = 10
learning_rate = 5e-5
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 65536
temperature = 0.7

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 10, total_hours = 8 }

[eval]
interval = 10
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 10, total_hours = 8 }

[val]
interval = 10
num_examples = 8
rollouts_per_example = 1

[buffer]
online_difficulty_filtering = false
seed = 2026

