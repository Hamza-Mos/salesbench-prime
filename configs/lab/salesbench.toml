# v39: return to Qwen3.5-0.8B after fixing the actual root cause of v37/v38 failures.
# v37 (0.8B) and v38 (4B) both had the OpenAI key 401-ing silently on every
# buyer LLM call → deterministic REJECT for every offer → no path to conversion
# regardless of base size. The v37 "0.8B capability ceiling" diagnosis was
# wrong; the real cause was a broken OPENAI_API_KEY. Fixed in secrets.env on
# 2026-05-09 — gpt-5-mini now responds with sensible JSON (verified locally).
# v39 returns to the Eli-mtg strategy: smallest base, scale leads via
# curriculum. With a real buyer in the loop, validate whether 0.8B + the v36
# reward shape can actually find conversions and learn at 2 leads.
# CRITICAL post-launch check: metric_buyer_llm_call_count must be > 0 by step 0.
# If it's still 0, buyer is silently broken again — stop run immediately.

model = "Qwen/Qwen3.5-0.8B"
max_steps = 200
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3.5-0.8b-salesbench-v39"
entity = "hamza-mos-university-of-waterloo"
