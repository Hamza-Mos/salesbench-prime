# v37: drop to small base for cheap validation of v36 reward fix.
# v36 step 0 on Qwen3.5-35B-A3B cost ~$73 — extrapolating to full curriculum
# = $1.5M-3M envelope. Validate the reward shape on a 4B model first
# (~5-10× cheaper) before committing to the expensive base.
# Strategy: Qwen3.5-4B for 2→6 lead curriculum (cheap, prove reward shape
# is healthy and tool discipline learns), then upgrade base to 9B at 6 leads
# and 35B-A3B at 20+ leads — paying for capacity only when needed.
# Reward fix unchanged from v36: no reward_quote_coverage, completion 0.10→0.02.
# Ceiling 1.42, floor ~0.01 (no conv).

model = "Qwen/Qwen3.5-4B"
max_steps = 200
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3.5-4b-salesbench-v37"
entity = "hamza-mos-university-of-waterloo"
