# v4: Fix step 9 ModelError collapse — lower lr, keep batch=256
# - lr 1e-4→5e-5 (prevent weight updates from breaking JSON tool formatting)
# - batch stays 256 (512 caused 50%+ ModelErrors from bad seeds under memory pressure)
# - episode_completion reward weight 0.30→0.50

model = "PrimeIntellect/INTELLECT-3.1"
max_steps = 50
batch_size = 256
rollouts_per_example = 16
max_async_level = 2
learning_rate = 5e-5
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 49152
temperature = 0.7

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 2 }

[eval]
interval = 10
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 2, total_hours = 2 }

[val]
interval = 10
num_examples = 8
rollouts_per_example = 1

[buffer]
online_difficulty_filtering = false
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 3

