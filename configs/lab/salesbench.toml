# v22: revert temp to 1.0 (matching v18, best run so far)
# v20 (lr=3e-5, temp=0.8) collapsed in 7 steps. v21 (lr=1e-5, temp=0.8) collapsed in 11.
# v18 (lr=1e-5, temp=1.0) showed steady upward trend 0.15→0.34.
# Hypothesis: temp=0.8 reduces exploration diversity, starving GRPO of gradient signal.

model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 100
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.0
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3-30b-salesbench-v22"
entity = "hamza-mos-university-of-waterloo"
