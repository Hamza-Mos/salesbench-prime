# v25: resume from v23 step 195 checkpoint + v24 env (0.19.0) + reward reweight
# v23 hit 1.41 peak (step 194) over 200 steps — 93% conversion, 82% budget capture
# v24 env adds stated_need, smoker pricing, suggested_adjustments (no LLM cost increase)
# Reward reweight: shift from saturated completion/conversion → budget utilization

model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
checkpoint_id = "ukux36wuiuka1vxj8ppvlqci"
max_steps = 300
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3-30b-salesbench-v25"
entity = "hamza-mos-university-of-waterloo"
