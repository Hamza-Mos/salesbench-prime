# v40: escalate base 0.8B → 4B after v39 confirmed real 0.8B capability ceiling.
# v39 (run k5e8gdxdqa8qg4weh6j3svw7) ran 27 steps with the FIXED buyer LLM and
# clearly collapsed: steps 0-8 engaged (propose 0.2/ep, conv 0.01-0.02/ep,
# turns 20-29), steps 16-26 full do-nothing (propose=0, conv=0, turns=1-2).
# The conv-reward gradient at ~1-2% of episodes was too sparse to override
# the invalid_action penalty before GRPO converged on "do nothing."
# v40 = same v36 reward shape, same 2 leads, ONE LEVER changed: model 0.8B → 4B.
# v38 was supposed to test this but had the broken-buyer confounder; v40 is the
# real first test of 4B with a working buyer. Buyer LLM verified working
# 2026-05-09 — gpt-5-mini returns sensible JSON.
# CRITICAL post-launch check: metric_buyer_llm_call_count must be > 0 by step 0.

model = "Qwen/Qwen3.5-4B"
max_steps = 200
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3.5-4b-salesbench-v40"
entity = "hamza-mos-university-of-waterloo"
