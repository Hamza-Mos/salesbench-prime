# Hosted RL starter config for the new salesbench-prime-rl harness.
# Replace the env id with your pushed private/public environment id.

model = "PrimeIntellect/INTELLECT-3.1"
max_steps = 300
batch_size = 256
rollouts_per_example = 16
oversampling_factor = 2.0
max_async_level = 10
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 16384
temperature = 0.7

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 10, total_hours = 8 }

[eval]
interval = 25
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 10, total_hours = 8 }

[val]
interval = 25
num_examples = 8
rollouts_per_example = 1

[buffer]
online_difficulty_filtering = true
easy_threshold = 0.85
hard_threshold = 0.20
easy_fraction = 0.0
hard_fraction = 0.0
seed = 2026

[wandb]
project = "salesbench"
name = "intellect3.1-salesbench-fast-v1"
entity = "hamza-mos-university-of-waterloo"
