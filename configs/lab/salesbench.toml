# v43: scale 4 → 8 leads, warm-start from v42 step 215 ckpt nj5i3p9hr6q8q46tvzhjcnmn.
# v42 (4 leads) MASTERED: 9/9 consecutive steps >= 1.35, avg 1.384 (97.5% ceiling),
# conv 96-99% per lead, MRR 96-99%, invalid_actions 0.10-0.29 (cleanest yet).
# Now jumping to 8 leads (2× scale). Same v36 reward shape, same fast-curriculum
# strategy: 2→4→8→20 (then eval at 100 leads).
# total_hours = 4 (30 min/lead, proportional).
# max_steps = 315 (= ckpt step 215 + 100 productive steps).

model = "Qwen/Qwen3.5-2B"
checkpoint_id = "nj5i3p9hr6q8q46tvzhjcnmn"
max_steps = 315
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 8, total_hours = 4, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3.5-2b-salesbench-v43"
entity = "hamza-mos-university-of-waterloo"
