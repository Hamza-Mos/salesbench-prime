# v37: drop to the smallest base for cheapest possible validation of the v36 reward fix.
# v36 step 0 on Qwen3.5-35B-A3B cost ~$73. Strategy revised 2026-05-08 (Eli mtg):
# stay on the small base and scale leads via curriculum (2→3→4→…→20) rather than
# escalating model size. Only escalate base if we hit a real capability ceiling.
# Starting at 0.8B (cheapest model offered, ~12-17× cheaper per token than 35B-A3B)
# to validate the recipe + reward fix at minimum cost. Bump to 4B/9B only if 0.8B
# can't learn tool discipline at all.
# Reward fix unchanged from v36: no reward_quote_coverage, completion 0.10→0.02.
# Ceiling 1.42, floor ~0.01 (no conv).

model = "Qwen/Qwen3.5-0.8B"
max_steps = 200
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3.5-0.8b-salesbench-v37"
entity = "hamza-mos-university-of-waterloo"
