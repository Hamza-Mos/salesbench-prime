# v6.1: Fix missing [[val.env]] block + add buyer LLM timeouts
# - Added [[val.env]] — validation was hanging without it
# - Env v0.7.1: 120s HTTP timeout + 180s hard cap on buyer LLM calls
# - Context summarization: threshold=0.80, keep_recent=10
# - All other params kept from v6 (max_tokens=4096, temp=1.0, 4 leads/4h)

model = "PrimeIntellect/INTELLECT-3.1"
max_steps = 50
batch_size = 256
rollouts_per_example = 16
max_async_level = 2
learning_rate = 5e-5
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 4, total_hours = 4, context_rewrite_threshold = 0.80, context_keep_recent = 10 }

[eval]
interval = 10
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 4, total_hours = 4, context_rewrite_threshold = 0.80, context_keep_recent = 10 }

[val]
interval = 10
num_examples = 8
rollouts_per_example = 1

[[val.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 64, num_leads = 4, total_hours = 4, context_rewrite_threshold = 0.80, context_keep_recent = 10 }

[buffer]
online_difficulty_filtering = false
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 3

