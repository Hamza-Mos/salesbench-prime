# v15: faster training — reduce episode scope, raise lr
# - num_leads 4 → 2 (halve seq_len ~12k→~6k; trainer 80min→~15min per step)
# - lr 1e-5 → 3e-5 (v13 collapse was penalty bug not lr; 3e-5 is safe middle ground)
# - batch 128 → 64 (shorter seqs = can afford smaller batch; further speeds trainer)
# - oversampling 2.0 (64 batch × 2.0 = 128 rollouts, keep fastest 64)
# - total_hours 2 → 1 (match reduced leads; tighter time pressure)
# - Expected: ~20min/step vs ~85min, 50 steps in <20h vs 3 days

model = "PrimeIntellect/INTELLECT-3.1"
max_steps = 50
batch_size = 64
rollouts_per_example = 16
oversampling_factor = 2.0
max_async_level = 2
learning_rate = 3e-5
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.90, context_keep_recent = 10, context_max_seq_len = 20000 }

[eval]
interval = 10
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.90, context_keep_recent = 10, context_max_seq_len = 20000 }

# [val]
# interval = 10
# num_examples = 8
# rollouts_per_example = 1

[buffer]
online_difficulty_filtering = false
seed = 2026

[checkpoints]
interval = 10
keep_cloud = 3

