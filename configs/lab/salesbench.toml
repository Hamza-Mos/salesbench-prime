# v23: same as v22 (best run, 0.17→0.73) but 200 steps to capture remaining gains
# v22 completed 100 steps with reward still climbing steeply at step 99

model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 200
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.0
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3-30b-salesbench-v23"
entity = "hamza-mos-university-of-waterloo"
