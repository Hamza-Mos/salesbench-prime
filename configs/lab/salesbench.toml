# v35: 12 leads + quote requirement — restart from clean v31 weights
# v34c collapsed after step 918 (60 steps of zero conversions). Recovery unstable.
# Restart from v31 step 795 (clean 8-lead weights, proper tool usage) with v0.24.2 env.
# 12 leads is the sweet spot — model mastered it in v32 but without quoting.
# With quote requirement, model must learn quote→propose at 12 leads.

checkpoint_id = "rxxuusyu1y99k8v3dral42bb"
model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 1095
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 12, total_hours = 2, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3-30b-salesbench-v35"
