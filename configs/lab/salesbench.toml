# v11: halve batch to reduce trainer bottleneck
# - batch=64 (was 128) — halves tokens/step from 5.1M to ~2.6M
# - oversampling=2.0 — launch 128, keep fastest 64 (cuts rollout long-tail)
# - Trainer was taking ~4h/batch on shared multi-tenant GPUs; expect ~2h now
# - 8 leads / 3 hours, pure MRR reward, threshold=0.60

model = "PrimeIntellect/INTELLECT-3.1"
max_steps = 50
batch_size = 64
rollouts_per_example = 16
oversampling_factor = 2.0
max_async_level = 2
learning_rate = 5e-5
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 8, total_hours = 3, context_rewrite_threshold = 0.60, context_keep_recent = 10 }

[eval]
interval = 10
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 8, total_hours = 3, context_rewrite_threshold = 0.60, context_keep_recent = 10 }

# [val]
# interval = 10
# num_examples = 8
# rollouts_per_example = 1

[buffer]
online_difficulty_filtering = false
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 3

