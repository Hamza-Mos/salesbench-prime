# v9: 8 leads / 3 hours, no completion bonus, threshold=0.60
# - 8 leads in 3 hours — tight time budget forces prioritization
# - Completion weight=0.0, reward purely from sales
# - context_rewrite_threshold=0.60 (keep aggressive summarization)
# - Env v0.10.0

model = "PrimeIntellect/INTELLECT-3.1"
max_steps = 50
batch_size = 256
rollouts_per_example = 16
max_async_level = 2
learning_rate = 5e-5
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 8, total_hours = 3, context_rewrite_threshold = 0.60, context_keep_recent = 10 }

[eval]
interval = 10
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 8, total_hours = 3, context_rewrite_threshold = 0.60, context_keep_recent = 10 }

# [val]
# interval = 10
# num_examples = 8
# rollouts_per_example = 1

[buffer]
online_difficulty_filtering = false
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 3

