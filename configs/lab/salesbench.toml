# v36: drop reward floor to break GRPO degenerate-collapse trap.
# v35 collapsed at step 829 — model locked onto qc(0.10)+completion(0.05)=0.15 floor
# and stopped exploring conversions. Removed reward_quote_coverage (env constraint
# already enforces it) and scaled reward_episode_completion 0.10→0.02.
# New ceiling: 1.42. New floor (no conv): ~0.01 (15× reduction).
# Same v31 step-795 checkpoint, same 12 leads — pure reward-shape change.

checkpoint_id = "rxxuusyu1y99k8v3dral42bb"
model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 1500
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 12, total_hours = 2, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3-30b-salesbench-v36"
entity = "hamza-mos-university-of-waterloo"
