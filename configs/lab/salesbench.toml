# v36: fresh start on Qwen3.5-35B-A3B + floor-reduced reward shape.
# Forced by platform: Qwen3-30B-A3B-Instruct-2507 was RETIRED (May 2026).
# Qwen3.5-35B-A3B is the direct successor — same MoE arch, 3B active.
# v31 LoRA checkpoint is dead (trained on old base) → train from scratch.
# Curriculum reset to 2 leads (proven sweet spot for fresh GRPO; rule #36).
# Reward fix carried over: removed reward_quote_coverage, completion 0.10→0.02.
# Ceiling 1.42, floor ~0.01 (no conv) — eliminates v35-style floor collapse.

model = "Qwen/Qwen3.5-35B-A3B"
max_steps = 500
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3-30b-salesbench-v36"
entity = "hamza-mos-university-of-waterloo"
