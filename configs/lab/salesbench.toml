# v27: 3 leads + error logging (v0.20.1), 500 steps for mid-run env swap to 4 leads
# v26 best: nuiukm339bhri6y202g3hndv (completed 200 steps, peak 1.354)
# Plan: monitor, when plateau push env with num_leads=4, stop & restart

model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 500
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 3, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3-30b-salesbench-v27"
entity = "hamza-mos-university-of-waterloo"
