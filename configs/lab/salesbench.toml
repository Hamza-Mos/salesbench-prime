# v21: revert lr from 3e-5 to 1e-5 to fix model collapse
# v20 collapsed: lr=3e-5 caused completion to drop 98%→23% in 7 steps
# v18 (lr=1e-5) showed steady upward trend 0.15→0.34. Keep everything else from v20.

model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 100
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.0
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 0.8

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3-30b-salesbench-v21"
entity = "hamza-mos-university-of-waterloo"
