# v14: fix capability degradation — lr too aggressive, batch too small, no completion signal
# - lr 5e-5 → 1e-5 (prevent knowledge destruction; v13 eval dropped 36.5% after 10 steps)
# - batch 64 → 128 (reduce gradient noise for high-variance multi-turn episodes)
# - Re-enable episode_completion weight 0.30 (binary signal; v13 only 50% completion)
# - Reduce penalty_invalid_actions -0.15 → -0.05 (unavoidable schema errors add noise)
# - oversampling 2.0 → 1.5 (128 batch × 1.5 = 192 rollouts, manageable)

model = "PrimeIntellect/INTELLECT-3.1"
max_steps = 50
batch_size = 128
rollouts_per_example = 16
oversampling_factor = 1.5
max_async_level = 2
learning_rate = 1e-5
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 4, total_hours = 2, context_rewrite_threshold = 0.90, context_keep_recent = 10, context_max_seq_len = 20000 }

[eval]
interval = 10
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 4, total_hours = 2, context_rewrite_threshold = 0.90, context_keep_recent = 10, context_max_seq_len = 20000 }

# [val]
# interval = 10
# num_examples = 8
# rollouts_per_example = 1

[buffer]
online_difficulty_filtering = false
seed = 2026

[checkpoints]
interval = 10
keep_cloud = 3

