# v38: escalate base 0.8B → 4B after v37 do-nothing collapse.
# v37 (Qwen3.5-0.8B, 2 leads, run r90m00fyzu2o38wksjs24co4) ran 35 steps then
# stopped at user request. Step 0 baseline showed the model attempting actions
# (0.32 start_call/ep, 0.41 propose_offer/ep). By step ~14 the model fully
# collapsed: 0 start_call, 0 quote_plan, 0 propose_offer, 0 leads_contacted,
# num_turns ≈ 1. RL learned that "no action" is the optimal policy because the
# invalid_action penalty (-0.005/error) was the only gradient — 0.8B never
# successfully converted, so conversion reward stayed at 0 and couldn't
# override the penalty. Documented capability-ceiling escalation trigger.
# v38 keeps the same v36 reward shape (no quote_coverage, completion=0.02) and
# the same 2-lead curriculum. ONLY change: base model 0.8B → 4B.
# Reward shape ceiling 1.42, floor ~0.01.

model = "Qwen/Qwen3.5-4B"
max_steps = 200
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3.5-4b-salesbench-v38"
entity = "hamza-mos-university-of-waterloo"
