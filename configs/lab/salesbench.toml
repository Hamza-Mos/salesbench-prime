# v42: scale 2 → 4 leads, warm-start from v41 (xx2cxrbn2snmjw0a6a8of1en).
# v41 COMPLETED 200 steps with 2-lead mastery — peak 1.416 (99.7% ceiling),
# 33+ consecutive steps >= 1.35, 100% conv per lead, 100% lead contact, 99% MRR.
# Now jumping to 4 leads with checkpoint_id warm-start (program.md lesson #44 +
# Option A scale-up). Fast scaling path: 2→4→8→20→50→100 (5 stages instead of
# 11), each warm-started. Expected to converge in ~50-100 productive steps
# instead of 200.
# Reward shape unchanged (v36, ceiling 1.42, floor ~0.01).
# total_hours scaled proportionally (4 × 30 min/lead = 2h).
# max_steps = 300 (per lesson #71: must be > checkpoint step 199, allow ~100
# productive steps on top of warm-start).

model = "Qwen/Qwen3.5-2B"
checkpoint_id = "xx2cxrbn2snmjw0a6a8of1en"
max_steps = 300
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.5
max_async_level = 1
learning_rate = 1e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 1.0

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 4, total_hours = 2, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3.5-2b-salesbench-v42"
entity = "hamza-mos-university-of-waterloo"
