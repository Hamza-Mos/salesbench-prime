# Fast proof-of-concept config: prove hill-climbing in <24h

model = "PrimeIntellect/INTELLECT-3.1"
max_steps = 50
batch_size = 32
rollouts_per_example = 8
max_async_level = 10
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 16384
temperature = 0.7

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 10, total_hours = 8 }

[eval]
interval = 10
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 10, total_hours = 8 }

[val]
interval = 10
num_examples = 8
rollouts_per_example = 1

[buffer]
online_difficulty_filtering = true
easy_threshold = 0.85
hard_threshold = 0.20
easy_fraction = 0.0
hard_fraction = 0.0
seed = 2026

[wandb]
project = "salesbench"
name = "intellect3.1-salesbench-fast-poc"
entity = "hamza-mos-university-of-waterloo"
