# v18: 2 leads, revenue-focused rewards, tighter async
# v17 problem: 1 lead too easy — base model already at reward ~1.1 (ceiling).
#   GRPO had zero gradient (all rollouts in group score similarly).
#   Also severe off-policy training: orchestrator far ahead of trainer.
# Key changes from v17:
# - num_leads 1 → 2 (model already closes 1 lead; now learn pipeline + revenue opt)
# - batch 256 → 128 (reduce trainer bottleneck + off-policy lag)
# - max_async_level 2 → 1 (tighter sync, less stale data)
# - Rewards: re-enable budget_utilization (0.30), reduce conversion_rate (0.50→0.20)
# - Keep lr=3e-5, temp=0.8 (worked fine in v17)

model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 100
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.0
max_async_level = 1
learning_rate = 3e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 0.8

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[eval]
interval = 5
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3-30b-salesbench-v18"
entity = "hamza-mos-university-of-waterloo"
