# v19: fix episode termination + system prompt for tool discipline
# v18 diagnosis: 78% of episodes ended prematurely via no_tools_called
#   (model outputs text between calls → episode dies → no completion bonus
#   → never contacts 2nd lead → only 12% revenue capture).
# Key changes from v18:
# - System prompt: CRITICAL RULE — every response must include a tool call
# - System prompt: contact ALL leads, immediately start next lead after end_call
# - no_tools_called: 1-turn grace period (don't kill for occasional narration)
# - Config/rewards unchanged from v18 (2 leads, same weights)

model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 100
batch_size = 128
rollouts_per_example = 32
oversampling_factor = 2.0
max_async_level = 1
learning_rate = 3e-5
lora_alpha = 64
env_file = ["../../secrets.env"]

[sampling]
max_tokens = 4096
temperature = 0.8

[[env]]
id = "salesbench/salesbench"
args = { split = "train", num_examples = 2048, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[eval]
interval = 5
num_examples = 16
rollouts_per_example = 2
eval_base_model = true

[[eval.env]]
id = "salesbench/salesbench"
args = { split = "eval", num_examples = 256, num_leads = 2, total_hours = 1, context_rewrite_threshold = 0.85, context_keep_recent = 10, context_max_seq_len = 16000 }

[buffer]
online_difficulty_filtering = true
seed = 2026

[checkpoints]
interval = 5
keep_cloud = 5

[wandb]
project = "salesbench"
name = "qwen3-30b-salesbench-v19"
entity = "hamza-mos-university-of-waterloo"
